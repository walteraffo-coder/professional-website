<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Farms & Extracts 46 — a Ghanaian phytochemical extraction and natural products manufacturer. Vertically integrated cultivation, extraction and finished products, supplying thaumatin, miracle berry and bespoke botanical extracts worldwide."
    />
    <meta property="og:title" content="Farms & Extracts 46 — Ghanaian Phytochemical Extraction & Natural Products" />
    <meta
      property="og:description"
      content="From West African soil to refined botanical extracts. Vertically integrated cultivation, extraction and manufacturing of high-value botanicals."
    />
    <meta property="og:type" content="website" />
    <title>Farms &amp; Extracts 46 — Ghanaian Phytochemical Extraction &amp; Natural Products</title>
  </head>
  <body>
    <!--
      Static form for Netlify build-time form detection. The live contact form
      is rendered by React and never exists in static HTML, so Netlify's
      crawler can only discover the form (and its fields) through this hidden
      copy. Field names MUST match the React form in src/App.jsx.
    -->
    <form name="contact" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="text" name="company" />
      <input type="email" name="email" />
      <select name="intended_recipient"></select>
      <select name="enquiry"></select>
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
